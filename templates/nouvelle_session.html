<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nouvelle session — Présence</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="admin-page">
  <header>
    <h1>Nouvelle session</h1>
  </header>

  <section class="form-section">
    <form method="post" action="{{ url_for('nouvelle_session') }}">
      <label for="groupe">Groupe</label>
      <input type="text" id="groupe" name="groupe" value="5A" required>

      <label for="cours">Cours</label>
      <select id="cours" name="cours" required>
        <option value="Image">Image</option>
        <option value="Optimisation">Optimisation</option>
        <option value="Signal">Signal</option>
        <option value="Ondelettes">Ondelettes</option>
        <option value="Projet">Projet</option>
        <option value="Autre">Autre</option>
      </select>

      <button type="submit">Démarrer</button>
    </form>
    <p><a href="{{ url_for('admin') }}">← Retour</a></p>
  </section>
</body>
</html>
